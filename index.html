<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirecting to Roblox</title>
  <meta http-equiv="refresh" content="0;url=https://www.roblox.com">
</head>
<body>
  <p>Redirecting to Roblox...</p>
  <a href="https://www.roblox.com">Click here if not redirected</a>
  
  <script>
    // Fallback redirect if meta refresh doesn't work
    window.location.href = "https://www.roblox.com";
  </script>
</body>
</html>
